<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Simple Status Pages for Your Projects · status.githack.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Create simple status pages for your projects and services. Monitor uptime and display service status with a clean, professional interface. Easy to deploy and customize.">
  <meta name="keywords" content="status page, service status, uptime monitoring, service health, project status, website status, API status">
  <meta name="author" content="status.githack.com">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://status.githack.com">
  <meta name="application-name" content="status.githack.com">
  <meta name="mobile-web-app-title" content="status.githack.com">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-status-bar-style" content="default">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%2328a745'/></svg>">
  <style>
*, *::before, *::after { box-sizing: border-box; }
body, h1, h3, h4, p, section, header, footer, small { margin: 0; padding: 0; }

:root {
  --c-success: #28a745;
  --c-partial:  #ffc107;
  --c-failure:  #dc3545;
  --c-nodata:   #868e96;
  --link:    #0d6efd;
  --bg:      #fff;
  --fg:      #212529;
  --muted:   #6c757d;
  --border:  #dee2e6;
  --radius:  6px;
  --radius-sm: 4px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:      #121212;
    --fg:      #e9ecef;
    --muted:   #adb5bd;
    --border:  #2c2c2c;
  }
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: system-ui, -apple-system, sans-serif;
  line-height: 1.5;
  overflow-x: hidden;
}

.wrap { max-width: 960px; min-width: 360px; margin: 0 auto; padding: 3rem 1rem; }

.wrap > header { text-align: center; margin-bottom: 2rem; }

h1 { font-size: 3rem; font-weight: 300; margin-bottom: .5rem; }

#repo-description { color: var(--muted); margin-bottom: .25rem; }
#repo-description.skeleton { width: 260px; height: .9rem; margin: 0 auto .5rem; }
#repo-link.skeleton { width: 160px; height: .85rem; margin: 0 auto; display: block; }
#last-updated { color: var(--muted); font-size: .8rem; margin-bottom: 1.5rem; }

#repo-link { color: var(--link); }

[data-status="success"] { --status: var(--c-success); --on-status: #fff;    }
[data-status="partial"]  { --status: var(--c-partial);  --on-status: #212529; }
[data-status="failure"]  { --status: var(--c-failure);  --on-status: #fff;    }
[data-status="nodata"]   { --status: var(--c-nodata);   --on-status: #fff;    }

section {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 1.5rem;
  overflow: hidden;
}

section > header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .6rem 1rem;
}

section[data-status] { border-color: var(--status); }

section[data-status] > header {
  background: var(--status);
  color: var(--on-status);
}

section[data-status] > header h3 {
  flex: 1;
  min-width: 0;
  font-size: .95rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
}

section[data-status] > header span {
  flex-shrink: 0;
  white-space: nowrap;
  margin-left: .75rem;
}

.card-uptime {
  display: block;
  text-align: right;
  color: var(--muted);
  font-size: .8rem;
  padding: .4rem 1rem .3rem;
}

.stream {
  display: grid;
  grid-template-columns: repeat(30, 1fr);
  gap: 2px;
  padding: .4rem 1rem 1rem;
}

.stream span[data-status] {
  height: 32px;
  width: 100%;
  background: var(--status);
  border-radius: var(--radius-sm);
  cursor: default;
  opacity: .85;
  transition: opacity .1s;
}
.stream span[data-status]:hover { opacity: 1; }

#tooltip {
  position: fixed;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .5rem .75rem;
  font-size: .85rem;
  width: max-content;
  max-width: 280px;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 4px 14px rgba(0,0,0,.15);
  z-index: 9999;
  line-height: 1.4;
}
#tooltip[hidden] { display: none; }
#tooltip strong  { display: block; margin-bottom: .3rem; }
#tooltip [data-status] { color: var(--status); }
#tooltip .tip-desc { color: var(--muted); font-size: .8rem; margin-top: .25rem; display: block; }

@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}

.skeleton {
  background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--radius-sm);
}

section[data-skeleton] > header { border-bottom: 1px solid var(--border); }
section[data-skeleton] .sk-title  { width: 40%; height: 1rem; }
section[data-skeleton] .sk-badge  { width: 18%; height: 1rem; }
section[data-skeleton] .sk-uptime { width: 30%; height: .75rem; margin: .6rem 1rem .5rem auto; }
section[data-skeleton] .sk-bar    { height: 2.5rem; margin: .4rem 1rem 1rem; }

[data-alert] {
  background: rgba(255, 193, 7, 0.12);
  border: 1px solid var(--c-partial);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-top: 1rem;
}
[data-alert] h4 { margin-bottom: .4rem; }

footer {
  text-align: center;
  color: var(--muted);
  font-size: .85rem;
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
footer .foot-links { margin-bottom: .75rem; }
footer .foot-links a { margin: 0 .6rem; }
footer a { color: var(--muted); text-decoration: none; }
footer a:hover { color: var(--fg); }
footer .foot-cta { margin-bottom: .5rem; }
footer .foot-cta a { color: var(--link); font-weight: 500; }

#status-ad {
  display: flex;
  justify-content: center;
  min-height: 200px;
  overflow: hidden;
  transition: opacity .6s, max-height .6s, min-height .6s, margin .6s;
}
#status-ad.hidden { opacity: 0; max-height: 0; min-height: 0; margin: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Service status</h1>
      <p id="repo-description" class="skeleton"></p>
      <a id="repo-link" class="skeleton" href="#" target="_blank"></a>
    </header>

    <main>
      <link rel="preconnect" href="https://server.ethicalads.io">
      <div id="status-ad" class="flat adaptive horizontal" data-ea-publisher="githackcom" data-ea-type="image" data-ea-verbosity="quiet"></div>
      <script defer src="https://media.ethicalads.io/media/client/ethicalads.min.js"></script>
      <script>
        window.addEventListener('load', () => {
          ethicalads.wait.then(placements => {
            if (!placements.length) {
              const ad = document.getElementById('status-ad');
              ad.classList.add('hidden');
              ad.addEventListener('transitionend', () => ad.remove(), { once: true });
            }
          });
        });
      </script>


      <div id="reports"></div>
      <p id="last-updated" hidden></p>
    </main>

    <footer>
      <div class="foot-links">
        <a href="/">Main page</a>
        <a href="https://github.com/neoascetic/status.githack.com" target="_blank">Source</a>
      </div>
      <div class="foot-cta">
        <span>Want your own status page? </span>
        <a href="https://github.com/neoascetic/status.githack.com#why-use-statusgithackcom" target="_blank">Create one for free</a>
      </div>
      <div>© 2025 <a href="https://github.com/neoascetic" class="text-decoration-none">Pavel Puchkin<a></a></div>
    </footer>
  </div>

  <div id="tooltip" hidden></div>

  <script type="module">
const MAX_DAYS = 30;
const repo = new URLSearchParams(location.search).get('r') || 'neoascetic/status.githack.com-monitor';
const logUrl = `https://raw.githubusercontent.com/${repo}/refs/heads/log/log.csv`;

const STATUS_PROPS = {
  success: { text: 'Fully Operational',  desc: 'No downtime recorded on this day' },
  partial: { text: 'Partial Outage',     desc: 'Partial outages recorded on this day' },
  failure: { text: 'Major Outage',       desc: 'Major outages recorded on this day' },
  nodata:  { text: 'No Data Available',  desc: 'Health check was not performed' },
};

function uptimeColor(val) {
  return val == null ? 'nodata' : val === 1 ? 'success' : val < 0.3 ? 'failure' : 'partial';
}

const STATUS_RANK = { success: 0, nodata: 0, partial: 1, failure: 2 };

function setFavicon(status) {
  const fill = { success: '%2328a745', partial: '%23ffc107', failure: '%23dc3545' }[status];
  if (!fill) return;
  document.querySelector('link[rel="icon"]').href =
    `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='${fill}'/></svg>`;
}

function buildSkeleton() {
  const el = document.createElement('section');
  el.dataset.skeleton = '';
  el.innerHTML =
    '<header><span class="skeleton sk-title"></span><span class="skeleton sk-badge"></span></header>' +
    '<span class="skeleton sk-uptime"></span>' +
    '<div class="skeleton sk-bar"></div>';
  return el;
}

function buildSquare(date, uptimeVal, counts) {
  const color = uptimeColor(uptimeVal);
  const { text, desc } = STATUS_PROPS[color];
  const btn = document.createElement('span');
  btn.dataset.status     = color;
  btn.dataset.date       = date.toDateString();
  btn.dataset.statusText = text;
  btn.dataset.statusDesc = desc;
  if (counts) {
    btn.dataset.total  = counts.total;
    btn.dataset.failed = counts.total - counts.ok;
  }
  return btn;
}

function buildCard(key, uptimeData) {
  const color = uptimeColor(uptimeData[0]);

  const h3 = document.createElement('h3');
  h3.textContent = key;

  const badge = document.createElement('span');
  badge.textContent = STATUS_PROPS[color].text;

  const header = document.createElement('header');
  header.append(h3, badge);

  const uptimeEl = document.createElement('small');
  uptimeEl.className = 'card-uptime';
  uptimeEl.textContent = `${uptimeData.upTime} in the last 30 days`;

  const stream = document.createElement('div');
  stream.className = 'stream';
  const today = new Date();
  for (let i = MAX_DAYS - 1; i >= 0; i--) {
    const date = new Date(today);
    date.setDate(today.getDate() - i);
    stream.appendChild(buildSquare(date, uptimeData[i], uptimeData.counts?.[i]));
  }

  const card = document.createElement('section');
  card.dataset.status = color;
  card.append(header, uptimeEl, stream);
  return card;
}

function buildNoDataAlert() {
  const el = document.createElement('div');
  el.dataset.alert = '';
  el.innerHTML = '<h4>No Data</h4><p>No monitoring data found for this repository. <br> Please check your configuration or wait for the first check to complete.</p>';
  return el;
}

function splitRowsByDate(rows) {
  const byDate = {};
  for (const [dateTimeStr, resultStr] of rows) {
    const date = new Date(Date.parse(dateTimeStr.replaceAll('-', '/') + ' GMT'));
    const key = date.toDateString();
    if (!byDate[key]) byDate[key] = [];
    const ok = parseInt(resultStr, 10);
    byDate[key].push(ok >= 200 && ok < 300 ? 1 : 0);
  }
  return byDate;
}

function normalizeData(logData) {
  const byDate = splitRowsByDate(logData);
  const now = Date.now();
  const result = {};
  result.counts = {};
  let sum30 = 0, count30 = 0;
  for (const [key, vals] of Object.entries(byDate)) {
    if (key === 'upTime') continue;
    const relDays = Math.floor(Math.abs(now - new Date(key).getTime()) / 864e5);
    const ok = vals.reduce((a, v) => a + v, 0);
    result[relDays] = vals.length ? ok / vals.length : null;
    result.counts[relDays] = { total: vals.length, ok };
    if (relDays < 30) { sum30 += ok; count30 += vals.length; }
  }
  result.upTime = count30 ? (sum30 / count30 * 100).toFixed(2) + '%' : '--%';
  return result;
}

async function loadReports() {
  const response = await fetch(logUrl);
  if (!response.ok) return null;

  const acc = {};
  let latestDateTime = null;
  for (const line of (await response.text()).split('\n').filter(l => l.trim())) {
    let [key, dateTime, status] = line.split(',');
    key = key.replaceAll('_', ' ');
    (acc[key] ??= []).push([dateTime, status]);
    if (!latestDateTime || dateTime > latestDateTime) latestDateTime = dateTime;
  }

  if (!Object.keys(acc).length) return null;

  const fragment = document.createDocumentFragment();
  let worstStatus = 'nodata';
  for (const key of Object.keys(acc).sort()) {
    const data = normalizeData(acc[key]);
    const color = uptimeColor(data[0]);
    if (STATUS_RANK[color] > STATUS_RANK[worstStatus]) worstStatus = color;
    fragment.appendChild(buildCard(key, data));
  }
  setFavicon(worstStatus);

  if (latestDateTime) {
    const d = new Date(Date.parse(latestDateTime.replaceAll('-', '/') + ' GMT'));
    const el = document.getElementById('last-updated');
    el.textContent = `Last check: ${d.toLocaleString()}`;
    el.hidden = false;
  }

  return fragment;
}
let refreshTimer;
function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refresh, 5 * 60_000);
}

async function refresh() {
  const reports = document.getElementById('reports');
  reports.replaceChildren((await loadReports()) ?? buildNoDataAlert());
  scheduleRefresh();
}

function getRepoInfo() {
  fetch(`https://api.github.com/repos/${repo}`)
    .then(r => r.json())
    .then(({ description, homepage }) => {
      const desc = document.getElementById('repo-description');
      desc.classList.remove('skeleton');
      desc.textContent = description || `Status page for ${repo}`;
      const link = document.getElementById('repo-link');
      link.classList.remove('skeleton');
      link.href = homepage || `https://github.com/${repo}`;
      link.textContent = homepage || link.href;
      document.title = homepage ? `Status page for ${homepage}` : `Status — ${repo}`;
    })
    .catch(() => document.getElementById('repo-description').parentElement.hidden = true);
}

function initTooltip() {
  const tooltip = document.getElementById('tooltip');
  const reports = document.getElementById('reports');

  reports.addEventListener('mouseover', e => {
    const btn = e.target.closest('span[data-status]');
    if (!btn) return;
    const { date, status, statusText, statusDesc, total, failed } = btn.dataset;
    const checksLine = total
      ? `<p class="tip-desc">${+failed > 0 ? `${failed} of ${total}` : total} check${+total > 1 ? 's' : ''}${+failed > 0 ? ' failed' : ' passed'}</p>`
      : '';
    tooltip.innerHTML =
      `<strong>${date}</strong>` +
      `<span data-status="${status}">${statusText}</span>` +
      `<p class="tip-desc">${statusDesc}</p>` +
      checksLine;
    tooltip.hidden = false;
  });

  reports.addEventListener('mouseout', e => {
    if (!e.relatedTarget?.closest('span[data-status]')) tooltip.hidden = true;
  });

  document.addEventListener('mousemove', e => {
    if (tooltip.hidden) return;
    const gap = 10, tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    const x = e.clientX + gap + tw + gap < window.innerWidth  ? e.clientX + gap : e.clientX - gap - tw;
    const y = e.clientY + gap + th + gap < window.innerHeight ? e.clientY + gap : e.clientY - gap - th;
    tooltip.style.left = Math.max(gap, x) + 'px';
    tooltip.style.top  = Math.max(gap, y) + 'px';
  });
}

const reports = document.getElementById('reports');
for (let i = 0; i < 3; i++) reports.appendChild(buildSkeleton());
refresh().then(initTooltip);
getRepoInfo();
  </script>
</body>
</html>
